name: Build and Deploy Vite App to Firebase Hosting

on:
  push:
    branches:
      - master
      - dev

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Firebase Target
        run: |
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "FIREBASE_TARGET=crypto-now-dev" >> $GITHUB_ENV
            echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_DEV }}" > .env
          elif [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "FIREBASE_TARGET=crypto-now-prod" >> $GITHUB_ENV
            echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_PROD }}" > .env
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting:${{ env.FIREBASE_TARGET }} --token ${{ secrets.FIREBASE_TOKEN }}