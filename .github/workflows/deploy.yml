name: Build and Deploy Vite App to Firebase Hosting

on:
  push:
    branches:
      - master
      - dev

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set target environment and project
        run: |
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "FIREBASE_TARGET=cryptonow-ng-dev" >> $GITHUB_ENV
            echo "FIREBASE_PROJECT=${{ secrets.FIREBASE_PROJECT_DEV }}" >> $GITHUB_ENV
            echo "FIREBASE_SITE_ID=${{ secrets.FIREBASE_PROJECT_DEV }}" >> $GITHUB_ENV
            echo "DEPLOY_ENV=development" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "FIREBASE_TARGET=cryptonow-ng" >> $GITHUB_ENV
            echo "FIREBASE_PROJECT=${{ secrets.FIREBASE_PROJECT_PROD }}" >> $GITHUB_ENV
            echo "FIREBASE_SITE_ID=${{ secrets.FIREBASE_PROJECT_PROD }}" >> $GITHUB_ENV
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure environment
        run: |
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_DEV }}" > .env
            echo "VITE_NODE_ENV=${{ secrets.VITE_NODE_ENV_DEV }}" >> .env
          elif [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_PROD }}" > .env
            echo "VITE_NODE_ENV=production" >> .env
          fi
          echo "✓ Environment configured for ${{ env.DEPLOY_ENV }}"

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: Build output directory 'dist' not found!"
            exit 1
          fi
          echo "✓ Build completed successfully"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Firebase Service Account (Dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}' > $HOME/gcloud-service-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-service-key.json" >> $GITHUB_ENV
          echo "✓ Service account configured for development"

      - name: Setup Firebase Service Account (Prod)
        if: github.ref == 'refs/heads/master'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}' > $HOME/gcloud-service-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-service-key.json" >> $GITHUB_ENV
          echo "✓ Service account configured for production"

      - name: Configure Firebase project and targets
        run: |
          cat > .firebaserc << EOF
          {
            "projects": {
              "default": "${{ env.FIREBASE_PROJECT }}"
            },
            "targets": {
              "${{ env.FIREBASE_PROJECT }}": {
                "hosting": {
                  "${{ env.FIREBASE_TARGET }}": [
                    "${{ env.FIREBASE_SITE_ID }}"
                  ]
                }
              }
            }
          }
          EOF
          
          echo "✓ Firebase configuration:"
          cat .firebaserc

      - name: Deploy to Firebase Hosting
        run: |
          firebase use ${{ env.FIREBASE_PROJECT }}
          firebase deploy --only hosting:${{ env.FIREBASE_TARGET }} --non-interactive

      - name: Cleanup
        if: always()
        run: |
          rm -f $HOME/gcloud-service-key.json

      - name: Deployment summary
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Environment: ${{ env.DEPLOY_ENV }}"
          echo "Target: ${{ env.FIREBASE_TARGET }}"
          echo "Project: ${{ env.FIREBASE_PROJECT }}"
          echo "Site ID: ${{ env.FIREBASE_SITE_ID }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
          exit 1