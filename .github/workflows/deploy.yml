name: Build and Deploy Vite App to Firebase Hosting

on:
  push:
    branches:
      - master
      - dev

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure environment
        run: |
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "FIREBASE_TARGET=crypto-now-dev" >> $GITHUB_ENV
            echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_DEV }}" > .env
          elif [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "FIREBASE_TARGET=crypto-now-prod" >> $GITHUB_ENV
            echo "VITE_BASE_URL=${{ secrets.VITE_BASE_URL_PROD }}" > .env
          fi

      - name: Build project
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCLOUD_PROJECT_ID }}
          service_account_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          export_default_credentials: true

      - name: Deploy to Firebase
        run: |
          firebase use crypto-now-8d762
          firebase deploy --only hosting:${{ env.FIREBASE_TARGET }} --non-interactive