<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title><%= title %></title>
  <style>
    /* Reset styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #333333;
      background-color: #f5f5f5;
      padding: 20px;
    }
    
    .email-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .email-header {
      padding: 20px 24px;
      background-color: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
    }
    
    .email-logo {
      max-width: 150px;
      height: auto;
      display: inline-block;
    }
    
    .email-body {
      padding: 30px 40px;
    }
    
    .email-title {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 20px;
    }
    
    .email-greeting {
      font-size: 16px;
      color: #333333;
      margin-bottom: 15px;
    }
    
    .email-text {
      font-size: 15px;
      color: #555555;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    /* Alert boxes */
    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      margin: 20px 0;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
    }
    
    .alert-icon {
      margin-right: 10px;
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .alert-warning {
      background-color: #fff4e5;
      color: #b54708;
      border-left: 4px solid #f79009;
    }
    
    .alert-error {
      background-color: #fef3f2;
      color: #b42318;
      border-left: 4px solid #f04438;
    }
    
    .alert-info {
      background-color: #eff8ff;
      color: #175cd3;
      border-left: 4px solid #2e90fa;
    }
    
    .alert-success {
      background-color: #ecfdf3;
      color: #067647;
      border-left: 4px solid #17b26a;
    }
    
    /* Data table */
    .data-table {
      width: 100%;
      margin: 25px 0;
      border-collapse: collapse;
    }
    
    .data-table tr {
      border-bottom: 1px solid #e5e7eb;
    }
    
    .data-table tr:last-child {
      border-bottom: none;
    }
    
    .data-table td {
      padding: 14px 4px;
      font-size: 14px;
      vertical-align: top;
    }
    
    .data-table td:first-child {
      color: #6b7280;
      font-weight: 500;
      width: 40%;
      padding-right: 16px;
      text-align: left;
      white-space: nowrap;
    }
    
    .data-table td:last-child {
      color: #1a1a1a;
      font-weight: 600;
      text-align: left;
      word-break: break-word;
    }
    
    /* Buttons */
    .button {
      display: inline-block;
      padding: 14px 28px;
      background-color: #1e293b;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      margin: 20px 0;
      transition: background-color 0.2s;
    }
    
    .button:hover {
      background-color: #0f172a;
    }
    
    .button-container {
      text-align: center;
      margin: 30px 0;
    }
    
    /* Code/verification code display */
    .verification-code {
      background-color: #f9fafb;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin: 25px 0;
    }
    
    .verification-code-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .verification-code-value {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 4px;
      font-family: 'Courier New', monospace;
    }
    
    /* Footer */
    .email-footer {
      background-color: #f9fafb;
      padding: 30px 40px;
      text-align: center;
      border-top: 1px solid #e5e7eb;
    }
    
    .footer-text {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 15px;
      line-height: 1.5;
    }
    
    .footer-signature {
      font-size: 14px;
      color: #374151;
      font-weight: 500;
      margin-bottom: 20px;
    }
    
    .footer-divider {
      height: 1px;
      background-color: #e5e7eb;
      margin: 20px 0;
    }
    
    .footer-contact {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 15px;
    }
    
    .footer-contact a {
      color: #1e293b;
      text-decoration: none;
    }
    
    .footer-social {
      margin-top: 18px;
    }
    
    .footer-social-text {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }
    
    .footer-social-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    
    .footer-social-links a {
      display: inline-block;
    }
    
    .footer-social-links img {
      width: 20px;
      height: 20px;
      display: block;
      border-radius: 999px;
    }
    
    /* Responsive */
    @media only screen and (max-width: 600px) {
      .email-body {
        padding: 20px 25px;
      }
      
      .email-footer {
        padding: 25px 25px;
      }
      
      .email-title {
        font-size: 20px;
      }
      
      .button {
        padding: 12px 24px;
        font-size: 14px;
      }
      
      .data-table td {
        font-size: 13px;
      }
      
      .footer-social-links {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="email-container">
    <div class="email-header">
      <img src="<%= logo_url %>" alt="<%= company_name %>" class="email-logo">
    </div>
    
    <div class="email-body">
      <%- body %>
    </div>
    
    <div class="email-footer">
      <p class="footer-contact">
        Questions or FAQ? Contact us at 
        <a href="mailto:<%= support_email %>"><%= support_email %></a> or 
        WhatsApp <a href="<%= support_whatsapp_url %>"><%= support_whatsapp_text %></a>.
      </p>

      <div class="footer-divider"></div>

      <p class="footer-text">
        <a href="<%= privacy_policy_url %>" style="color: #1e293b; text-decoration: none;">Privacy Policy</a>
      </p>

      <p class="footer-text" style="margin-top: 8px; font-size: 12px;">
        © <%= new Date().getFullYear() %> <%= company_name %>. All rights reserved.
      </p>

      <div class="footer-social">
        <p class="footer-social-text">
          Stay connected with <%= company_name %>
        </p>
        <div class="footer-social-links">
          <a href="<%= social_x_link %>">
            <img src="<%= social_x_icon_url %>" alt="X (Twitter)">
          </a>
          <a href="<%= social_tiktok_link %>">
            <img src="<%= social_tiktok_icon_url %>" alt="TikTok">
          </a>
          <a href="<%= social_whatsapp_link %>">
            <img src="<%= social_whatsapp_icon_url %>" alt="WhatsApp">
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
